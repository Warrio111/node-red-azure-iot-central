<script type="text/javascript">
    RED.nodes.registerType('azure-iot-central-config', {
        category:    'config',
        defaults: {
            name:        { value: '' },
            scopeid:     { value: '', required: true },
            deviceid:    { value: '', required: true },
            transport:   { value: 'mqtt' },
            auth:        { value: 'sas' },
            certfile:    { value: '' },
            certkeyfile: { value: '' }
        },
        credentials: {
            primarykey: { type: 'password' },
            passphrase:  { type: 'password' }
        },
        label: function () {
            return this.name || this.deviceid || 'IoT Central Config';
        },
        oneditprepare: function () {
            function toggleAuth() {
                if ($('#node-config-input-auth').val() === 'x509') {
                    $('.iotc-x509').show();
                    $('.iotc-sas').hide();
                } else {
                    $('.iotc-x509').hide();
                    $('.iotc-sas').show();
                }
            }
            toggleAuth();
            $('#node-config-input-auth').on('change', toggleAuth);
        }
    });
</script>

<script type="text/javascript">
    RED.nodes.registerType('azure-iot-central-device', {
        category:     'Azure IoT',
        color:        '#0072C6',
        defaults: {
            name:     { value: '' },
            server:   { value: '', type: 'azure-iot-central-config', required: true },
            commands: { value: '' }
        },
        inputs:  1,
        outputs: 3,
        icon:    'font-awesome/fa-cloud',
        label: function () {
            return this.name || 'Azure IoT Central';
        },
        paletteLabel:  'IoT Central',
        inputLabels:   ['telemetry / reported properties'],
        outputLabels:  ['commands (cloud→device)', 'desired properties', 'status'],

        oneditprepare: function () {
            var self = this;

            $('#node-input-commands-list').editableList({
                addItem: function (container, i, item) {
                    $('<input/>', {
                        type:        'text',
                        placeholder: 'commandName  (e.g. reboot)',
                        style:       'width: 100%',
                        value:       item.name || ''
                    }).appendTo(container);
                },
                removable: true,
                sortable:  true
            });

            // Populate from saved value
            (self.commands || '')
                .split('\n')
                .map(function (s) { return s.trim(); })
                .filter(Boolean)
                .forEach(function (name) {
                    $('#node-input-commands-list').editableList('addItem', { name: name });
                });
        },

        oneditsave: function () {
            var commands = [];
            $('#node-input-commands-list').editableList('items').each(function () {
                var val = $(this).find('input').val().trim();
                if (val) commands.push(val);
            });
            this.commands = commands.join('\n');
        }
    });
</script>

    <div class="form-tips" style="margin-top:8px">
        <b>Input</b> &mdash;
        <code>msg.topic = "telemetry"</code> sends payload as telemetry.<br>
        <code>msg.topic = "reported"</code> updates device twin reported properties.<br><br>

        <b>Output 2</b> &mdash; Desired property delta. Acknowledgment sent automatically.<br>
        <b>Output 3</b> &mdash; Status events: <code>connected</code>, <code>telemetry_sent</code>,
        <code>reported_sent</code>, <code>error</code>.
    </div>

<script type="text/html" data-help-name="azure-iot-central-device">
    <p>
        Connects to <b>Azure IoT Central</b> via DPS auto-provisioning and maintains a persistent
        device connection with automatic exponential-backoff reconnection (2 s → 60 s).
    </p>

    <h3>Input</h3>
    <dl class="message-properties">
        <dt>topic <span class="property-type">string</span></dt>
        <dd>
            <code>telemetry</code> (default) — sends <code>msg.payload</code> as JSON telemetry.<br>
            <code>reported</code> — updates device twin reported properties with <code>msg.payload</code>.
        </dd>
        <dt>payload <span class="property-type">object | string</span></dt>
        <dd>Telemetry data or reported-properties object.</dd>
        <dt>componentName <span class="property-type">string</span></dt>
        <dd>Optional IoT Central component name added as <code>$.sub</code> property on telemetry messages.</dd>
        <dt>messageId <span class="property-type">string</span></dt>
        <dd>Optional message ID forwarded to the IoT Hub message envelope.</dd>
    </dl>

    <h3>Output 1 — Cloud Commands</h3>
    <dl class="message-properties">
        <dt>topic <span class="property-type">string</span></dt>
        <dd>Command name (e.g. <code>reboot</code>).</dd>
        <dt>payload <span class="property-type">object</span></dt>
        <dd>Command parameters sent from IoT Central.</dd>
        <dt>methodName <span class="property-type">string</span></dt>
        <dd>Same as <code>topic</code>.</dd>
        <dt>requestId <span class="property-type">string</span></dt>
        <dd>IoT Hub request correlation ID.</dd>
        <dt>_respond <span class="property-type">function(statusCode, payload, cb?)</span></dt>
        <dd>
            Call this in a function node to acknowledge the command.<br>
            Example: <code>msg._respond(200, { result: 'ok' });</code><br>
            Must be called within 30 seconds or an automatic 200 is sent.
        </dd>
    </dl>

    <h3>Output 2 — Desired Properties</h3>
    <dl class="message-properties">
        <dt>topic <span class="property-type">string</span></dt>
        <dd>Always <code>desired</code>.</dd>
        <dt>payload <span class="property-type">object</span></dt>
        <dd>Object containing only the changed desired properties.</dd>
        <dt>version <span class="property-type">number</span></dt>
        <dd>Twin document version. Acknowledgment is sent back to IoT Central automatically.</dd>
    </dl>

    <h3>Output 3 — Status</h3>
    <dl class="message-properties">
        <dt>topic <span class="property-type">string</span></dt>
        <dd>
            <code>connected</code> — payload: <code>{ hub, deviceId }</code><br>
            <code>telemetry_sent</code> — payload: <code>{ payload }</code><br>
            <code>reported_sent</code> — payload: <code>{ payload }</code><br>
            <code>error</code> — payload: <code>{ operation, error }</code>
        </dd>
    </dl>

    <h3>Notes</h3>
    <ul>
        <li>Connects automatically on deploy — no inject node required.</li>
        <li>HTTP transport supports telemetry only; commands and device twin require MQTT or AMQP.</li>
        <li>Each node instance maintains its own connection — multiple instances are independent.</li>
        <li>Desired property acknowledgments (version-stamped) are sent automatically.</li>
    </ul>

    <h3>Command handler example (function node wired to output 1)</h3>
    <pre>
// Wire Output 1 → function node
if (msg.methodName === 'reboot') {
    // do work…
    msg._respond(200, { status: 'rebooting' });
}
return null; // don't forward the command further
    </pre>
</script>
